<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page non trouvée | Louis Subtil</title>
    <meta name="robots" content="noindex">

    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar" aria-label="Navigation principale">
        <div class="nav-container">
            <div class="nav-logo">
                <a href="index.html">Louis Subtil</a>
            </div>
            <div class="nav-menu">
                <a href="index.html#home" class="nav-link">Accueil</a>
                <a href="index.html#about" class="nav-link">À propos</a>
                <a href="index.html#portfolio" class="nav-link">Portfolio</a>
                <a href="index.html#contact" class="nav-link">Contact</a>
            </div>
        </div>
    </nav>

    <main>
        <section class="error-page">
            <div class="container">
                <div class="error-page-content">
                    <div class="error-icon">
                        <i class="fas fa-map-signs" aria-hidden="true"></i>
                    </div>
                    <h1 class="error-code">404</h1>
                    <h2 class="error-title">Page non trouvée</h2>
                    <p class="error-description">Désolé, la page que vous cherchez n'existe pas ou a été déplacée.</p>
                    <div class="error-actions">
                        <a href="index.html" class="btn btn-primary">
                            <i class="fas fa-home" aria-hidden="true"></i> Retour à l'accueil
                        </a>
                        <a href="index.html#portfolio" class="btn btn-secondary">
                            <i class="fas fa-folder-open" aria-hidden="true"></i> Voir le portfolio
                        </a>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <p>&copy; <span id="currentYear"></span> Louis Subtil. Tous droits réservés.</p>
                <div class="social-links">
                    <a href="https://github.com/Lounol72" target="_blank" rel="noopener noreferrer" aria-label="Profil GitHub"><i class="fab fa-github" aria-hidden="true"></i></a>
                    <a href="https://www.linkedin.com/in/louis-subtil" target="_blank" rel="noopener noreferrer" aria-label="Profil LinkedIn"><i class="fab fa-linkedin" aria-hidden="true"></i></a>
                    <a href="mailto:louis.subtil@etu.univ-lemans.fr" aria-label="Envoyer un email"><i class="fas fa-envelope" aria-hidden="true"></i></a>
                </div>
            </div>
        </div>
    </footer>

    <style>
    .error-page {
        min-height: calc(100vh - 160px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: var(--space-20) 0;
        background: var(--bg-primary);
    }

    .error-page-content {
        text-align: center;
        max-width: 560px;
        margin: 0 auto;
    }

    .error-icon {
        font-size: 4rem;
        color: var(--color-primary);
        margin-bottom: var(--space-4);
        opacity: 0.8;
    }

    .error-code {
        font-size: var(--text-6xl);
        font-weight: var(--font-extrabold);
        color: var(--color-primary);
        line-height: 1;
        margin-bottom: var(--space-4);
        text-shadow: var(--shadow-glow);
    }

    .error-title {
        font-size: var(--text-3xl);
        font-weight: var(--font-bold);
        color: var(--color-heading);
        margin-bottom: var(--space-4);
    }

    .error-description {
        font-size: var(--text-lg);
        color: var(--color-text-muted);
        margin-bottom: var(--space-8);
        line-height: var(--leading-relaxed);
    }

    .error-actions {
        display: flex;
        gap: var(--space-4);
        justify-content: center;
        flex-wrap: wrap;
    }
    </style>

    <script>
    const yearEl = document.getElementById('currentYear');
    if (yearEl) yearEl.textContent = String(new Date().getFullYear());
    </script>
</body>
</html>
