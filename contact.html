    <main>
    <!-- Contact Section -->
    <section class="contact" style="margin-top: 80px;">
        <div class="container">
            <h2>Contactez-moi</h2>
            <div class="contact-content">
                <div class="contact-info">
                    <h3>Informations de contact</h3>
                    <p><i class="fas fa-envelope"></i> louis.subtil@etu.univ-lemans.fr</p>
                    <p><i class="fas fa-map-marker-alt"></i> Le Mans, France</p>
                    <p><i class="fas fa-university"></i> Université du Mans</p>
                    <p><i class="fas fa-graduation-cap"></i> Étudiant en Informatique</p>
                    
                    <div class="social-links" style="margin-top: 2rem;">
                        <a href="https://github.com/Lounol72" target="_blank" rel="noopener noreferrer" class="social-link" aria-label="Profil GitHub"><i class="fab fa-github" aria-hidden="true"></i> GitHub</a>
                        <a href="https://www.linkedin.com/in/louis-subtil" target="_blank" rel="noopener noreferrer" class="social-link" aria-label="Profil LinkedIn"><i class="fab fa-linkedin" aria-hidden="true"></i> LinkedIn</a>
                        <a href="mailto:louis.subtil@etu.univ-lemans.fr" class="social-link" aria-label="Envoyer un email"><i class="fas fa-envelope" aria-hidden="true"></i> Email</a>
                    </div>
                </div>
                
                <div class="contact-form">
                    <h3>Envoyez-moi un message</h3>
                    <form id="contactForm" action="https://formspree.io/f/xovkgrqv" method="POST">
                        <div class="form-group">
                            <label for="name">Nom *</label>
                            <input type="text" id="name" name="name" required>
                        </div>
                        <div class="form-group">
                            <label for="email">Email *</label>
                            <input type="email" id="email" name="email" required>
                        </div>
                        <div class="form-group">
                            <label for="subject">Sujet</label>
                            <input type="text" id="subject" name="subject">
                        </div>
                        <div class="form-group">
                            <label for="message">Message *</label>
                            <textarea id="message" name="message" rows="5" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">Envoyer le message</button>
                    </form>
                </div>
            </div>
        </div>
    </section>
